<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SorteaPlay</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}
.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}
h1 {
  color: #333;
}
input {
  padding: 10px;
  width: 70%;
  margin-bottom: 10px;
}
button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.primary {
  background: #4CAF50;
  color: white;
}
.secondary {
  background: #2196F3;
  color: white;
}
.list {
  text-align: left;
  margin-top: 10px;
}
.result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <h1>SorteaPlay</h1>

  <input id="nameInput" placeholder="Nombre del niño">
  <button onclick="addName()" class="primary">Añadir</button>

  <div class="list" id="nameList"></div>

  <h3>Elige juego</h3>
  <select id="game">
    <option value="pilla">Pilla pilla</option>
    <option value="escondite">Escondite</option>
    <option value="policias">Policías y ladrones</option>
    <option value="pañuelo">El pañuelo</option>
    <option value="equipos">Carrera por equipos</option>
  </select>

  <br><br>
  <button onclick="sortear()" class="secondary">Sortear</button>

  <div class="result" id="result"></div>
</div>

<script>
let names = [];

function addName() {
  const input = document.getElementById("nameInput");
  const name = input.value.trim();
  if (name && names.length < 10) {
    names.push(name);
    input.value = "";
    renderList();
  }
}

function renderList() {
  document.getElementById("nameList").innerHTML = names.join("<br>");
}

function randomize(array) {
  return array.sort(() => Math.random() - 0.5);
}

function sortear() {
  if (names.length === 0) return;

  const game = document.getElementById("game").value;
  let shuffled = randomize([...names]);
  let resultText = "";

  if (game === "pilla") {
    resultText = "Le toca pillar a: " + shuffled[0];
  }

  if (game === "escondite") {
    resultText = "Empieza buscando: " + shuffled[0];
  }

  if (game === "policias") {
    let mid = Math.ceil(shuffled.length / 2);
    resultText = "Policías: " + shuffled.slice(0, mid).join(", ") +
                 "<br>Ladrones: " + shuffled.slice(mid).join(", ");
  }

  if (game === "pañuelo") {
    let mid = Math.ceil(shuffled.length / 2);
    resultText = "Equipo A: " + shuffled.slice(0, mid).join(", ") +
                 "<br>Equipo B: " + shuffled.slice(mid).join(", ");
  }

  if (game === "equipos") {
    let teamSize = Math.ceil(shuffled.length / 2);
    resultText = "Equipo 1: " + shuffled.slice(0, teamSize).join(", ") +
                 "<br>Equipo 2: " + shuffled.slice(teamSize).join(", ");
  }

  document.getElementById("result").innerHTML = resultText;
}
</script>

</body>
</html>
